services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11134:11434"
    volumes:
      - ollama:/root/.ollama
    restart: always
    
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    restart: always

volumes:
  ollama:
  open-webui:
